<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Comic Tracker V8 Ultimate</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0a;
  color:white;
  text-align:center;
}

h1 { color:#00ff99; margin-top:10px; }

input {
  padding:10px;
  width:70%;
  border-radius:8px;
  border:none;
}

button {
  padding:8px;
  margin:3px;
  border-radius:8px;
  border:none;
  background:#00ff99;
  cursor:pointer;
}

.stats {
  margin:10px;
  font-size:14px;
  opacity:0.9;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
  padding:10px;
}

.card {
  background:#1a1a1a;
  border-radius:10px;
  padding:8px;
  position:relative;
}

.card img {
  width:100%;
  border-radius:6px;
}

.small {
  font-size:12px;
  opacity:0.8;
}

.star {
  position:absolute;
  top:5px;
  right:8px;
  color:gold;
  font-size:18px;
  cursor:pointer;
}

.filters {
  margin:10px 0;
}

.filter-btn {
  background:#222;
  color:white;
}

.active {
  background:#00ff99;
  color:black;
}

</style>
</head>

<body>

<h1>📚 Comic Tracker V8 Ultimate</h1>

<input id="search" placeholder="Batman, Joker, Marvel..." oninput="suggest()">
<button onclick="searchComic()">Suchen</button>

<div class="filters">
<button class="filter-btn active" onclick="setFilter('all')">Alle</button>
<button class="filter-btn" onclick="setFilter('batman')">Batman</button>
<button class="filter-btn" onclick="setFilter('joker')">Joker</button>
<button class="filter-btn" onclick="setFilter('marvel')">Marvel</button>
<button class="filter-btn" onclick="setFilter('dc')">DC</button>
</div>

<div class="stats">
📚 <span id="count">0</span> |
📖 <span id="pages">0</span> Seiten |
💰 <span id="price">0</span> € |
⭐ <span id="fav">0</span> Favoriten
</div>

<h2>🔎 Ergebnisse</h2>
<div id="results" class="grid"></div>

<h2>⭐ Sammlung</h2>
<div id="collection" class="grid"></div>

<script>

let collection = JSON.parse(localStorage.getItem("comics")) || [];
let filter = "all";

/* SAVE */
function save(){
  localStorage.setItem("comics", JSON.stringify(collection));
}

/* FILTER */
function setFilter(f){
  filter = f;
  render();
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

/* STATS + RENDER */
function render(){

  let box = document.getElementById("collection");
  box.innerHTML = "";

  let pages = 0;
  let price = 0;
  let favCount = 0;

  let filtered = collection.filter(c=>{
    if(filter === "all") return true;
    return c.title.toLowerCase().includes(filter);
  });

  filtered.forEach((c,i)=>{

    pages += Number(c.pages);
    price += Number(c.price);
    if(c.fav) favCount++;

    box.innerHTML += `
      <div class="card">
        <span class="star" onclick="toggleFav(${i})">
          ${c.fav ? "★" : "☆"}
        </span>

        <img src="${c.cover}">
        <p><b>${c.title}</b></p>
        <p class="small">${c.pages} Seiten</p>

        <button onclick="removeComic(${i})">❌</button>
      </div>
    `;
  });

  document.getElementById("count").innerText = filtered.length;
  document.getElementById("pages").innerText = pages;
  document.getElementById("price").innerText = price;
  document.getElementById("fav").innerText = favCount;
}

/* REMOVE */
function removeComic(i){
  collection.splice(i,1);
  save();
  render();
}

/* FAVORITE */
function toggleFav(i){
  collection[i].fav = !collection[i].fav;
  save();
  render();
}

/* SEARCH */
async function searchComic(){

  let q = document.getElementById("search").value.trim();
  if(!q) return;

  let res = await fetch(`https://openlibrary.org/search.json?q=comic+${q}`);
  let data = await res.json();

  let results = document.getElementById("results");
  results.innerHTML = "";

  data.docs
    .filter(b=>b.title && b.number_of_pages_median)
    .slice(0,10)
    .forEach(book=>{

      let title = book.title;
      let pages = book.number_of_pages_median;

      let cover = book.cover_i
        ? `https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg`
        : "https://via.placeholder.com/150";

      let div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${cover}">
        <p><b>${title}</b></p>
        <p class="small">${pages} Seiten</p>

        <button onclick='addComic(${JSON.stringify(title)},${pages},"${cover}")'>
          ➕ Add
        </button>
      `;

      results.appendChild(div);
    });
}

/* ADD */
function addComic(title,pages,cover){

  let price = prompt("Preis (€):");
  if(!price) return;

  collection.push({
    title,
    pages,
    price,
    cover,
    fav:false
  });

  save();
  render();
}

render();

</script>

</body>
</html>
