<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Comic Database Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
  text-align:center;
}

h1{color:#00ff99;margin:10px;}

input{
  padding:10px;
  margin:5px;
  width:70%;
  border-radius:8px;
  border:none;
}

button{
  padding:8px;
  margin:4px;
  border-radius:8px;
  border:none;
  background:#00ff99;
  cursor:pointer;
}

.form{
  background:#111;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.stats{
  margin:10px;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#1a1a1a;
  border-radius:10px;
  padding:8px;
  position:relative;
}

.card img{
  width:100%;
  border-radius:6px;
}

.small{
  font-size:12px;
  opacity:0.8;
}

.star{
  position:absolute;
  top:5px;
  right:8px;
  color:gold;
  cursor:pointer;
  font-size:18px;
}
</style>
</head>

<body>

<h1>📚 Comic Database Pro</h1>

<!-- 🔥 ADD FORM -->
<div class="form">

<h3>➕ Comic hinzufügen</h3>

<input id="title" placeholder="Titel">
<input id="pages" placeholder="Seiten">
<input id="series" placeholder="Serie (Batman, Joker...)">
<input id="publisher" placeholder="Publisher (DC, Marvel)">
<input id="cover" placeholder="Cover URL (optional)">

<button onclick="addComic()">Hinzufügen</button>

</div>

<!-- 🔎 SEARCH -->
<input id="search" oninput="render()" placeholder="Suchen...">

<div class="stats">
📚 <span id="count">0</span> |
📖 <span id="pagesTotal">0</span> Seiten |
💰 <span id="priceTotal">0</span> € |
⭐ <span id="favTotal">0</span>
</div>

<h2>📚 Meine Datenbank</h2>
<div id="db" class="grid"></div>

<script>

/* 🧠 EIGENE DATENBANK */
let comicsDB = JSON.parse(localStorage.getItem("db")) || [];

/* 💾 SAVE */
function save(){
  localStorage.setItem("db", JSON.stringify(comicsDB));
}

/* ➕ ADD COMIC */
function addComic(){

  let title = document.getElementById("title").value;
  let pages = document.getElementById("pages").value;
  let series = document.getElementById("series").value;
  let publisher = document.getElementById("publisher").value;
  let cover = document.getElementById("cover").value;

  if(!title || !pages) return;

  if(!cover){
    cover = "https://via.placeholder.com/150";
  }

  comicsDB.push({
    title,
    pages,
    series,
    publisher,
    cover,
    fav:false
  });

  save();
  clearForm();
  render();
}

/* 🧹 FORM RESET */
function clearForm(){
  document.getElementById("title").value="";
  document.getElementById("pages").value="";
  document.getElementById("series").value="";
  document.getElementById("publisher").value="";
  document.getElementById("cover").value="";
}

/* ⭐ FAVORIT */
function toggleFav(i){
  comicsDB[i].fav = !comicsDB[i].fav;
  save();
  render();
}

/* ❌ DELETE */
function deleteComic(i){
  comicsDB.splice(i,1);
  save();
  render();
}

/* 🔎 RENDER + SEARCH */
function render(){

  let q = document.getElementById("search").value.toLowerCase();

  let box = document.getElementById("db");
  box.innerHTML = "";

  let pagesTotal = 0;
  let priceTotal = 0;
  let favTotal = 0;

  let filtered = comicsDB.filter(c =>
    c.title.toLowerCase().includes(q) ||
    (c.series || "").toLowerCase().includes(q) ||
    (c.publisher || "").toLowerCase().includes(q)
  );

  filtered.forEach((c,i)=>{

    pagesTotal += Number(c.pages);
    if(c.fav) favTotal++;

    box.innerHTML += `
      <div class="card">
        <span class="star" onclick="toggleFav(${i})">
          ${c.fav ? "★" : "☆"}
        </span>

        <img src="${c.cover}">
        <p><b>${c.title}</b></p>
        <p class="small">${c.pages} Seiten</p>
        <p class="small">${c.series || ""} | ${c.publisher || ""}</p>

        <button onclick="deleteComic(${i})">❌</button>
      </div>
    `;
  });

  document.getElementById("count").innerText = filtered.length;
  document.getElementById("pagesTotal").innerText = pagesTotal;
  document.getElementById("favTotal").innerText = favTotal;
}

/* 🚀 START */
render();

</script>

</body>
</html>
